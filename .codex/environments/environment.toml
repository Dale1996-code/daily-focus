# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "Daily-Focus-Hub"

[setup]
script = '''
cd "$env:CODEX_WORKTREE_PATH"

npm install

npm run check
if ($LASTEXITCODE -ne 0) {
  Write-Host "npm run check failed; continuing setup"
}

if ($env:DATABASE_URL) {
  npm run db:push
  if ($LASTEXITCODE -ne 0) {
    Write-Host "npm run db:push failed; continuing setup"
  }
} else {
  Write-Host "DATABASE_URL not set; skipping db:push"
}
'''

[cleanup]
script = '''
rm -rf node_modules
rm -rf dist
'''

[[actions]]
name = "Start Dev Server"
icon = "tool"
command = "npm run dev"

[[actions]]
name = "Start Frontend"
icon = "tool"
command = "npm run dev:client"

[[actions]]
name = "Build App"
icon = "tool"
command = "npm run build"

[[actions]]
name = "Start Production"
icon = "tool"
command = "npm run start"

[[actions]]
name = "Push DB Schema"
icon = "tool"
command = '''
cd "$env:CODEX_WORKTREE_PATH"

if ($env:DATABASE_URL) {
  npm run db:push
} else {
  Write-Host "DATABASE_URL not set; cannot run db:push"
}
'''
